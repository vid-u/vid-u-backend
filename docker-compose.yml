# Backend uses an anonymous volume for node_modules so Linux deps stay inside the container.
# After adding npm packages on the host, refresh the volume once, e.g.:
#   docker compose exec backend npm install
# or remove the anonymous volume (docker compose down && docker volume prune) then up again.
services:
  backend:
    image: node:22
    container_name: bughyve-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bughyve?schema=public
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  postgres:
    image: postgres:16
    container_name: bughyve-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bughyve
    ports:
      - "5434:5432"
    volumes:
      - bughyve_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bughyve"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bughyve_pgdata:
