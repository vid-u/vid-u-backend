# Anonymous volume keeps Linux node_modules inside the container.
services:
  backend:
    image: node:22
    container_name: vidu-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vidu_backend?schema=public
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev:docker"

  postgres:
    image: postgres:16
    container_name: vidu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidu_backend
    ports:
      - "5432:5432"
    volumes:
      - vidu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vidu_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vidu_pgdata:
